name: core
description: "Core package — shared foundation for all apps."
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  dio: ^5.9.2
  go_router: ^17.2.3
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.2.0
  intl: any
  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.3
  firebase_performance: ^0.10.0+8
  # Offline Database (Drift - replaces Isar which is discontinued)
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.13
  drift_dev: ^2.33.0

flutter:
  generate: true
